[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_APP_NAME,VITE_APP_VERSION,VITE_APP_LOCALE,VITE_APP_CURRENCY,VITE_STORAGE_DRIVER,VITE_STORAGE_PREFIX,VITE_ENABLE_DEMO_DATA,VITE_ENABLE_PWA,VITE_SYNC_PROVIDER,VITE_SYNC_ENABLED,VITE_API_BASE_URL,VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY,VITE_FIREBASE_API_KEY,VITE_FIREBASE_AUTH_DOMAIN,VITE_FIREBASE_PROJECT_ID,VITE_FIREBASE_STORAGE_BUCKET,VITE_FIREBASE_MESSAGING_SENDER_ID,VITE_FIREBASE_APP_ID,VITE_SENTRY_DSN,VITE_NETLIFY_SITE_URL,DATABASE_SSL"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
